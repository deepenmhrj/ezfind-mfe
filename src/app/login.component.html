<section class="login-page">
  <mat-card class="login-card">
    <h1>{{ mode === 'login' ? 'Sign in to EzFind' : 'Create your EzFind account' }}</h1>

    <form (ngSubmit)="submit()" autocomplete="off">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="email" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" [(ngModel)]="password" required />
        <mat-hint *ngIf="mode === 'register'">Use at least 8 characters</mat-hint>
      </mat-form-field>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button mat-raised-button color="primary" type="submit" [disabled]="submitting" class="full-width">
        {{ submitting ? 'Please wait...' : mode === 'login' ? 'Login' : 'Register' }}
      </button>
    </form>

    <div class="separator" *ngIf="googleAvailable">
      <span>or</span>
    </div>

    <div id="google-signin-button" class="google-button" *ngIf="googleAvailable"></div>

    <button mat-button type="button" (click)="toggleMode()">
      {{ mode === 'login' ? 'Need an account? Register' : 'Have an account? Login' }}
    </button>
  </mat-card>
</section>
